<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#38bdf8;--pb:#7dd3fc;--pd:#0c4a6e;
  --bg:#020b18;--card:#04111f;--card2:#061928;
  --border:#0d2844;--border2:#1a4060;
  --red:#f43f5e;--yellow:#fbbf24;--green:#34d399;--purple:#a855f7;
  --text:#bae6fd;--dim:#1e5a8c;--glow:rgba(56,189,248,.2);
}
body{background:var(--bg);font-family:'Share Tech Mono','Courier New',monospace;color:var(--text);min-height:100vh;line-height:1.5}
.scanlines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,20,40,.09) 3px,rgba(0,20,40,.09) 4px)}
.wrap{max-width:900px;margin:0 auto;padding:12px}
/* HEADER */
.hdr{text-align:center;padding:18px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px}
.hdr h1{font-size:clamp(1.3rem,4vw,2rem);letter-spacing:.3em;text-shadow:0 0 22px var(--p),0 0 50px rgba(56,189,248,.3);animation:flicker 9s infinite}
.hdr .sub{color:var(--dim);font-size:.75em;margin-top:3px}
/* BOXES */
.box{border:1px solid var(--border);background:var(--card);padding:14px;margin:8px 0;border-radius:3px}
.box-title{font-size:.84em;letter-spacing:.1em;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);text-transform:uppercase;color:var(--pb)}
/* INPUTS */
input,select,textarea{background:var(--bg);border:1px solid var(--pd);color:var(--text);font-family:inherit;
  padding:7px 9px;width:100%;margin:3px 0 7px;border-radius:2px;font-size:.86em;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--p);box-shadow:0 0 7px var(--glow)}
select option{background:var(--bg)}
label.lbl{display:block;color:var(--dim);font-size:.75em;margin-top:4px}
textarea{resize:vertical;min-height:70px}
/* BUTTONS */
button{background:transparent;border:1px solid var(--pd);color:var(--dim);font-family:inherit;
  padding:6px 12px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;font-size:.8em;
  transition:all .15s;border-radius:2px;margin:2px}
button:hover:not(:disabled){border-color:var(--p);color:var(--p);box-shadow:0 0 9px var(--glow)}
button.active,button.primary{border-color:var(--p);color:var(--p)}
button.primary{box-shadow:0 0 12px var(--glow)}
button.btn-big{padding:10px 18px;font-size:.9em;width:100%;margin:5px 0}
button.btn-ok{border-color:var(--green);color:var(--green)}
button.btn-ok:hover:not(:disabled){background:var(--green);color:var(--bg)}
button.btn-danger{border-color:var(--red);color:var(--red)}
button.btn-danger:hover{background:var(--red);color:#fff}
button.btn-purple{border-color:var(--purple);color:var(--purple)}
button.btn-purple:hover:not(:disabled){background:var(--purple);color:#fff}
button.btn-yellow{border-color:var(--yellow);color:var(--yellow)}
button.btn-yellow:hover:not(:disabled){background:var(--yellow);color:var(--bg)}
button:disabled{opacity:.32;cursor:not-allowed}
/* COLORS */
.cp{color:var(--p)}.cpb{color:var(--pb)}.cdim{color:var(--dim)}.cred{color:var(--red)}
.cyellow{color:var(--yellow)}.cgreen{color:var(--green)}.ctext{color:var(--text)}.cpurple{color:var(--purple)}
.glow{text-shadow:0 0 9px var(--p)}.glow-r{text-shadow:0 0 9px var(--red)}.glow-g{text-shadow:0 0 7px var(--green)}.glow-y{text-shadow:0 0 7px var(--yellow)}
/* LAYOUT */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:540px){.grid2,.grid3{grid-template-columns:1fr}}
.flexi{display:flex;align-items:center}.flexb{display:flex;justify-content:space-between;align-items:center;gap:8px}
.flex-wrap{display:flex;flex-wrap:wrap;gap:6px}
.gap6{gap:6px}.gap10{gap:10px}.mt6{margin-top:6px}.mt12{margin-top:12px}.mb6{margin-bottom:6px}.mb12{margin-bottom:12px}
.bold{font-weight:bold}.small{font-size:.78em}.xs{font-size:.7em}.wrap-word{word-break:break-word}
/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:10px}
.tabs button.active{background:var(--p);color:var(--bg);border-color:var(--p)}
.notif-dot{display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin-left:3px;vertical-align:middle}
/* QUEST CARDS */
.qcard{border:1px solid var(--border);background:var(--card);padding:11px;margin:6px 0;border-radius:2px}
.qcard.done{border-color:var(--pd);opacity:.55}
.qcard.fail{border-color:var(--red);background:rgba(244,63,94,.04)}
.qcard.active{border-color:var(--pd)}
.qcard.pending-proof{border-color:var(--yellow);background:rgba(251,191,36,.04)}
.qcard.approved{border-color:var(--green);background:rgba(52,211,153,.03)}
/* DIFFICULTY BADGES */
.diff{display:inline-block;padding:1px 6px;border-radius:2px;font-size:.7em;margin-right:5px;font-weight:bold}
.diff-easy{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.diff-medium{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.3)}
.diff-hard{background:rgba(244,63,94,.12);color:var(--red);border:1px solid rgba(244,63,94,.3)}
.diff-legendary{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.4)}
/* BADGES */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
.b-card{border:1px solid var(--border);background:var(--card);padding:10px;text-align:center;border-radius:3px;transition:border-color .2s}
.b-card.unlocked{border-color:var(--yellow);background:rgba(251,191,36,.04);box-shadow:0 0 10px rgba(251,191,36,.1)}
.b-card.secret{border-color:var(--pd);background:rgba(168,85,247,.05)}
.b-card.secret.unlocked{border-color:var(--purple);box-shadow:0 0 12px rgba(168,85,247,.2)}
.b-card.locked{opacity:.4}
.b-card .b-icon{font-size:1.7em;margin-bottom:3px}
.b-card .b-name{font-size:.77em;letter-spacing:.04em;margin-bottom:2px}
.b-card .b-desc{font-size:.65em;color:var(--dim)}
.b-card .b-date{font-size:.62em;color:var(--yellow);margin-top:3px}
/* INLINE BADGES */
.ibadge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:2px;font-size:.68em;margin:1px}
.ibadge.xp{background:var(--yellow);color:#000}
.ibadge.pen{background:var(--red);color:#fff}
.ibadge.purple{background:rgba(168,85,247,.2);color:var(--purple);border:1px solid rgba(168,85,247,.4)}
/* MEMBER CARDS */
.mcard{border:1px solid var(--border);background:var(--card);padding:9px 12px;margin:5px 0;border-radius:2px}
.mcard.gold{border-color:var(--yellow);box-shadow:0 0 12px rgba(251,191,36,.12)}
.mcard.shame{border-color:var(--red);background:rgba(244,63,94,.04)}
/* PARTY PICKER */
.picker{cursor:pointer;padding:20px;text-align:center;border:1px solid var(--border);background:var(--card);transition:border-color .2s,box-shadow .2s;border-radius:3px}
.picker:hover{border-color:var(--p);box-shadow:0 0 14px var(--glow)}
.picker .icon{font-size:2em;margin-bottom:6px}
.picker .plabel{color:var(--yellow);letter-spacing:.05em;font-size:.9em}
.picker .pdesc{color:var(--dim);font-size:.72em;margin-top:4px}
/* NOTIFICATIONS */
.notif{padding:8px 10px;border-left:3px solid var(--p);background:rgba(56,189,248,.05);margin:5px 0;font-size:.82em}
.notif.err{border-color:var(--red);color:var(--red);background:rgba(244,63,94,.05)}
.notif.warn{border-color:var(--yellow);color:var(--yellow);background:rgba(251,191,36,.05)}
.notif.ok{border-color:var(--green);color:var(--green);background:rgba(52,211,153,.05)}
.notif.purple{border-color:var(--purple);color:var(--purple);background:rgba(168,85,247,.05)}
/* TIMER */
.timer-box{text-align:center;padding:12px;border:1px solid var(--yellow);color:var(--yellow);margin:9px 0;border-radius:3px}
.timer-box .t-num{font-size:1.7em;letter-spacing:.1em;text-shadow:0 0 12px rgba(251,191,36,.4)}
.timer-box.urgent{border-color:var(--red);color:var(--red)}
.timer-box.urgent .t-num{text-shadow:0 0 12px rgba(244,63,94,.4);animation:pulse-r 1.1s infinite}
.timer-box.closed{border-color:var(--dim);color:var(--dim);font-size:.85em;padding:10px}
/* SHAME */
.shame-wrap{border:1px solid var(--red);background:rgba(244,63,94,.05);padding:12px;margin:8px 0;border-radius:3px;animation:pulse-r 2.2s infinite}
/* MODAL */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:4px;padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:1em;letter-spacing:.1em;color:var(--pb);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
/* REACTIONS */
.reaction-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.rxn{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:.82em;transition:all .15s;background:transparent}
.rxn:hover{border-color:var(--p);background:rgba(56,189,248,.08)}
.rxn.mine{border-color:var(--p);background:rgba(56,189,248,.1);color:var(--p)}
.rxn-count{font-size:.75em;color:var(--dim)}
/* SPIN */
.spin-box{border:2px solid var(--yellow);padding:24px;text-align:center;border-radius:4px;position:relative;overflow:hidden}
.spin-result{font-size:2.5em;margin:12px 0;min-height:60px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.spin-result.spinning{animation:spin-flash .1s infinite}
@keyframes spin-flash{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
/* PROGRESS */
.pbar{height:3px;background:var(--border);margin:5px 0;border-radius:2px;overflow:hidden}
.pbar .fill{height:100%;background:var(--p);transition:width .5s}
.pbar .fill.red{background:var(--red)}.pbar .fill.green{background:var(--green)}.pbar .fill.yellow{background:var(--yellow)}
/* EVENT BANNER */
.event-banner{padding:10px 14px;border:1px solid var(--purple);background:rgba(168,85,247,.08);border-radius:3px;margin:8px 0;text-align:center;animation:glow-pulse 3s infinite}
@keyframes glow-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 18px rgba(168,85,247,.3)}}
/* PROFILE */
.avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4em;font-weight:bold;flex-shrink:0}
.title-chip{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75em;border:1px solid;margin:2px}
/* SETUP GUIDE */
.gstep{padding:8px 12px;margin:4px 0;border-left:2px solid var(--pd);background:rgba(56,189,248,.03);border-radius:0 2px 2px 0;font-size:.82em}
.gstep .sn{color:var(--yellow);margin-right:6px}
/* CODE */
.code{display:inline-block;letter-spacing:.22em;font-size:1.1em;color:var(--yellow);padding:2px 8px;border:1px solid rgba(251,191,36,.4);background:rgba(251,191,36,.06);cursor:pointer;border-radius:2px}
/* EMPTY */
.empty{text-align:center;padding:28px;color:var(--dim)}
.empty .ei{font-size:2em;margin-bottom:7px}
/* LOG ENTRIES */
.log-e{padding:10px 0;border-bottom:1px solid var(--border)}
.log-e:last-child{border-bottom:none}
.log-e .ll{margin:1px 0;font-size:.85em}
/* SETTINGS */
.srow{display:grid;grid-template-columns:170px 1fr;align-items:center;gap:10px;margin:6px 0}
@media(max-width:500px){.srow{grid-template-columns:1fr}}
.srow label{color:var(--dim);font-size:.79em;text-transform:uppercase}
/* SUMMARY */
.summary-stat{text-align:center;padding:12px;border:1px solid var(--border);border-radius:3px;background:var(--card2)}
.summary-stat .s-val{font-size:1.8em;color:var(--p);text-shadow:0 0 10px var(--glow)}
.summary-stat .s-lbl{font-size:.7em;color:var(--dim);margin-top:3px}
/* TOAST */
.toast-wrap{position:fixed;top:14px;right:14px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card2);border:1px solid var(--border2);border-radius:3px;padding:10px 14px;max-width:260px;pointer-events:none;font-size:.82em;box-shadow:0 4px 20px rgba(0,0,0,.5)}
/* ANIMATIONS */
@keyframes flicker{0%,100%{opacity:1}94%{opacity:1}95%{opacity:.65}96%{opacity:1}98%{opacity:.8}99%{opacity:1}}
@keyframes pulse-r{0%,100%{box-shadow:none}50%{box-shadow:0 0 16px rgba(244,63,94,.45)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.blink{animation:blink 1s infinite}
@keyframes pop-in{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.pop-in{animation:pop-in .25s ease-out}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--pd)}
/* CHAT */
.chat-area{max-height:420px;overflow-y:auto;padding:10px 12px;min-height:180px;scroll-behavior:smooth}
.chat-bubble{max-width:80%;padding:8px 12px;word-break:break-word;font-size:.85em;line-height:1.5}
.chat-bubble.mine{background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.3);border-radius:12px 12px 3px 12px}
.chat-bubble.theirs{background:var(--card2);border:1px solid var(--border);border-radius:12px 12px 12px 3px}
.chat-input-row{border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px}
/* GROUP CHIP */
.gchip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border2);border-radius:3px;background:var(--card2);cursor:pointer;transition:border-color .15s}
.gchip:hover{border-color:var(--p)}
/* PET SYSTEM */
.pet-emoji{display:inline-block;line-height:1;transition:all .3s;position:relative;z-index:1}
.pet-emoji.flourishing{animation:pet-bounce .65s ease-in-out infinite alternate}
.pet-emoji.stable{animation:pet-float 2.8s ease-in-out infinite}
.pet-emoji.strained{animation:pet-droop 2.2s ease-in-out infinite}
.pet-emoji.critical{animation:pet-weak 1.4s ease-in-out infinite}
.pet-emoji.lost{animation:pet-spirit 2.5s ease-in-out infinite;filter:grayscale(1) opacity(.5)}
@keyframes pet-bounce{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-14px) scale(1.1)}}
@keyframes pet-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pet-droop{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(6px) rotate(3deg)}}
@keyframes pet-weak{0%,100%{transform:scale(1) rotate(-2deg);opacity:.65}50%{transform:scale(.9) rotate(2deg);opacity:.35}}
@keyframes pet-spirit{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-14px);opacity:.85}}
@keyframes aura-pulse{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.25);opacity:.65}}
.pet-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:6px 0}
.pet-bar .fill{height:100%;border-radius:4px;transition:width .9s ease}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px}
.item-card{border:1px solid var(--border);background:var(--card);padding:10px;text-align:center;border-radius:3px;transition:all .2s}
.item-card.unlocked{cursor:pointer}.item-card.unlocked:hover{border-color:var(--p);box-shadow:0 0 8px var(--glow)}
.item-card.equipped{border-color:var(--yellow);background:rgba(251,191,36,.07);box-shadow:0 0 10px rgba(251,191,36,.12)}
.item-card.locked{opacity:.38;cursor:not-allowed}
.item-card.seasonal{border-color:rgba(168,85,247,.6);background:rgba(168,85,247,.05)}
.item-card.seasonal.unlocked:hover{border-color:var(--purple);box-shadow:0 0 10px rgba(168,85,247,.3)}
.archive-card{border:1px solid var(--border);background:var(--card2);padding:12px;border-radius:3px;margin:6px 0;display:flex;align-items:center;gap:12px}
.archive-card.spirit{opacity:.55;filter:grayscale(.5)}
/* COINS */
.coin-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.35);border-radius:20px;font-size:.75em;color:var(--yellow)}
/* SHOP */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px}
.shop-card{border:1px solid var(--border);background:var(--card);padding:12px;border-radius:3px;text-align:center;transition:all .2s;cursor:pointer}
.shop-card:hover:not(.cant-afford):not(.owned){border-color:var(--yellow);box-shadow:0 0 10px rgba(251,191,36,.15)}
.shop-card.cant-afford{opacity:.42;cursor:not-allowed}
.shop-card.owned{border-color:var(--green);background:rgba(52,211,153,.04);cursor:default}
.shop-card.active-boost{border-color:var(--p);background:rgba(56,189,248,.06);animation:glow-pulse 3s infinite}
/* AVATAR PICKER */
.av-emoji-grid{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0}
.av-opt{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:2px solid transparent;cursor:pointer;font-size:1.4em;transition:all .15s;background:var(--card2)}
.av-opt:hover,.av-opt.sel{border-color:var(--p);box-shadow:0 0 8px var(--glow)}
.av-color-grid{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0}
.av-color{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s}
.av-color:hover,.av-color.sel{border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,.4)}
</style>

function getWeekInfo(settings={}, now=new Date()) {
  const s={...DEF,...settings};
  const d=new Date(now), day=d.getDay(), hr=d.getHours();
  let back = day===s.windowDay?(hr>=s.windowHour?0:7):((day-s.windowDay+7)%7||7);
  const start=new Date(d); start.setDate(d.getDate()-back); start.setHours(s.windowHour,0,0,0);
  const end=new Date(start); end.setDate(start.getDate()+s.durationDays); end.setHours(s.deadlineHour,59,59,999);
  const id=start.toISOString().slice(0,10);
  const inWindow=d>=start&&d<=end, expired=d>end, left=Math.max(0,end-d);
  const hoursLeft=left/3600000;
  const urgentMsg = inWindow ? FUNNY_DEADLINE.find(m=>hoursLeft<=m.max)||FUNNY_DEADLINE[0] : null;
  return { id, start, end, inWindow, expired, left, hoursLeft, urgentMsg };
}

}

function computeStats(allQuests, uid) {
  let xp=0, penalties=0, completed=0, total=0, completedThisWeek=0;
  const today_d=new Date().toDateString();
  Object.values(allQuests||{}).forEach(wq=>{
    Object.values(wq||{}).forEach(q=>{
      if(q.assignedTo!==uid)return;
      total++;
      if(q.completed){xp+=q.xpAwarded||XP_WIN;completed++;}
      if(q.penaltyApplied&&!q.completed)penalties++;
    });
  });
  return {xp:Math.max(0,xp),penalties,completed,total};
}

function computeStreak(allQuests, uid) {
  const wks=Object.keys(allQuests||{}).sort();
  let cur=0,longest=0;
  wks.forEach(wk=>{
    const hasCompletion=Object.values(allQuests[wk]||{}).some(q=>q.assignedTo===uid&&q.completed);
    if(hasCompletion){cur++;longest=Math.max(longest,cur);}else{const hasAny=Object.values(allQuests[wk]||{}).some(q=>q.assignedTo===uid);if(hasAny)cur=0;}
  });
  return {current:cur,longest};
}

function getPetMonthKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}

function computePetState(allQuests,userId){
  const wids=Object.keys(allQuests||{}).sort();
  const recent=wids.slice(-4);
  const rates=recent.map(wid=>{
    const mine=Object.values(allQuests[wid]||{}).filter(q=>q.assignedTo===userId);
    if(!mine.length)return null;
    return mine.filter(q=>q.completed).length/mine.length;
  }).filter(r=>r!==null);
  if(!rates.length)return'stable';
  const avg=rates.reduce((a,b)=>a+b,0)/rates.length;
  const last=rates[rates.length-1];
  const streak=computeStreak(allQuests,userId).current;
  if(rates.length>=3&&rates.every(r=>r<0.05))return'lost';
  if(streak>=3&&avg>=0.75)return'flourishing';
  if(avg>=0.55&&last>=0.4)return'stable';
  if(avg>=0.2||last>=0.2)return'strained';
  return'critical';
}

function computePetPersonality(allQuests,userId){
  const wids=Object.keys(allQuests||{}).sort();
  const rates=wids.map(wid=>{
    const mine=Object.values(allQuests[wid]||{}).filter(q=>q.assignedTo===userId);
    if(!mine.length)return null;
    return mine.filter(q=>q.completed).length/mine.length;
  }).filter(r=>r!==null);
  if(!rates.length||rates.length<2)return rates.length===1&&rates[0]>0.5?'loyal':'shy';
  const avg=rates.reduce((a,b)=>a+b,0)/rates.length;
  const variance=rates.reduce((a,r)=>a+Math.pow(r-avg,2),0)/rates.length;
  if(avg>=0.8&&variance<0.04)return'loyal';
  if(avg>=0.5&&variance<0.08)return'calm';
  if(variance>0.18)return'unstable';
  if(avg<0.25)return'shy';
  return'moody';
}

function isPetItemUnlocked(item,stats,badges){
  const c=stats.completed||0,streak=stats.streak||0,b=badges||{};
  const seasonal=!!item.month;
  if(seasonal)return item.month===(new Date().getMonth()+1);
  switch(item.unlock){
    case'complete_5':  return c>=5;
    case'complete_10': return c>=10;
    case'complete_15': return c>=15;
    case'complete_25': return c>=25;
    case'complete_50': return c>=50;
    case'top_dog':     return!!b.TOP_DOG;
    case'streak_3':    return streak>=3;
    case'flawless':    return!!b.FLAWLESS;
    case'night_owl':   return!!(b.NIGHT_OWL||b.SECRET_NIGHT_OWL);
    case'ghost':       return!!(b.GHOST||b.SECRET_GHOST);
    case'legend':      return!!b.LEGENDARY;
    default:           return false;
  }
}

function getUnlockedTitles(stats, earnedBadges, streak) {
  return TITLES.filter(t=>{
    if(t.badge) return earnedBadges[t.badge];
    if(t.penalties) return stats.penalties>=t.penalties;
    if(t.streak) return streak.current>=t.streak||streak.longest>=t.streak;
    return (t.xp||0)<=stats.xp;
  });
}

function checkBadges(allQuests, uid, members) {
  const stats=computeStats(allQuests,uid);
  const others=Object.keys(members||{}).filter(id=>id!==uid);
  const earned={};
  const wks=Object.keys(allQuests||{}).sort();
  let hadFail=false, noFailStreak=0;
  wks.forEach(wk=>{
    const qlist=Object.values(allQuests[wk]||{});
    const mine=qlist.filter(q=>q.assignedTo===uid);
    const byMe=qlist.filter(q=>q.assignedBy===uid);
    if(!mine.length)return;
    const wkDone=mine.filter(q=>q.completed).length;
    const wkFail=mine.filter(q=>q.penaltyApplied&&!q.completed).length;
    const allDone=mine.length>=2&&wkDone===mine.length&&wkFail===0;
    if(wkDone>=1)earned.INITIATE=true;
    if(wkDone>=5)earned.OVERACHIEVER=true;
    if(wkDone>=10)earned.GRINDER=true;
    if(allDone)earned.FLAWLESS=true;
    if(allDone&&hadFail)earned.COMEBACK=true;
    const aTo=new Set(byMe.map(q=>q.assignedTo));
    if(others.length>0&&others.every(id=>aTo.has(id)))earned.QUEST_GIVER=true;
    mine.forEach(q=>{if(q.completed&&q.completedAt&&q.createdAt&&(q.completedAt-q.createdAt)<4*3600000)earned.SPEEDSTER=true;});
    if(wkFail>0){hadFail=true;noFailStreak=0;}else noFailStreak++;
  });
  if(noFailStreak>=2)earned.UNTOUCHABLE=true;
  if(stats.completed>=25)earned.DEDICATED=true;
  if(stats.completed>=100)earned.CENTURY=true;
  if(stats.xp>=1000)earned.LEGENDARY=true;
  const myXP=stats.xp;
  if(myXP>0&&others.length>0&&others.every(id=>computeStats(allQuests,id).xp<=myXP))earned.TOP_DOG=true;
  // New badges
  const allQList=Object.values(allQuests||{}).flatMap(wq=>Object.values(wq||{}));
  if(allQList.some(q=>q.assignedTo===uid&&q.completed&&q.difficulty==='legendary'))earned.BOUNTY_HUNTER=true;
  const weeksWithCompletion=wks.filter(wk=>Object.values(allQuests[wk]||{}).some(q=>q.assignedTo===uid&&q.completed)).length;
  if(weeksWithCompletion>=5)earned.WEEK_WARRIOR=true;
  if(stats.completed>=50)earned.COMPLETIONIST=true;
  if(allQList.filter(q=>q.assignedTo===uid&&q.proofStatus==='approved').length>=10)earned.PROOF_MASTER=true;
  if(allQList.some(q=>q.assignedTo===uid&&q.isInstaQuest&&q.completed))earned.INSTA_HERO=true;
  // SOCIAL_ASSIGN: assigned to 3+ different people in one week
  wks.forEach(wk=>{
    const byMe=Object.values(allQuests[wk]||{}).filter(q=>q.assignedBy===uid);
    if(new Set(byMe.map(q=>q.assignedTo)).size>=3)earned.SOCIAL_ASSIGN=true;
  });
  return earned;
}

function checkSecretBadges(allQuests, uid, members) {
  const earned={};
  const allWks=Object.keys(allQuests||{}).sort();
  let prevLast=false;
  allWks.forEach(wk=>{
    const qlist=Object.values(allQuests[wk]||{});
    const mine=qlist.filter(q=>q.assignedTo===uid);
    if(!mine.length)return;
    mine.forEach(q=>{
      if(q.completed&&q.completedAt){
        const hr=new Date(q.completedAt).getHours();
        if(hr>=0&&hr<4)earned.NIGHT_OWL=true;
        if(q.createdAt&&(q.completedAt-q.createdAt)<3600000)earned.EARLY_BIRD=true;
      }
    });
    const todayCompleted=mine.filter(q=>q.completed).length;
    if(todayCompleted>=5)earned.MARATHON=true;
    const allFailed=mine.length>0&&mine.every(q=>q.penaltyApplied&&!q.completed);
    if(allFailed)earned.GHOST=true;
  });
  // First blood: check if uid was first to complete in any week
  allWks.forEach(wk=>{
    const qlist=Object.values(allQuests[wk]||{}).filter(q=>q.completed&&q.completedAt);
    if(!qlist.length)return;
    qlist.sort((a,b)=>a.completedAt-b.completedAt);
    if(qlist[0].assignedTo===uid)earned.FIRST_BLOOD=true;
  });
  // Rejection count
  const totalRejections=Object.values(allQuests||{}).flatMap(wq=>Object.values(wq||{}))
    .filter(q=>q.assignedBy===uid&&q.proofStatus==='rejected').length;
  if(totalRejections>=3)earned.CRITIQUER=true;
  // LAST_SECOND: complete within 30 min of deadline (rough: within 30 min of end of 4-day window from week start)
  allWks.forEach(wk=>{
    const qlist=Object.values(allQuests[wk]||{}).filter(q=>q.assignedTo===uid&&q.completed&&q.completedAt);
    qlist.forEach(q=>{
      const startOfWeek=new Date(wk+'T00:00:00').getTime();
      const endGuess=startOfWeek+4*24*3600000+(23*3600000+59*60000);
      if(q.completedAt>=(endGuess-30*60*1000)&&q.completedAt<=endGuess)earned.LAST_SECOND=true;
    });
  });
  // INSTA_FUMBLE: failed an insta-quest
  const allQl2=Object.values(allQuests||{}).flatMap(wq=>Object.values(wq||{}));
  if(allQl2.some(q=>q.assignedTo===uid&&q.isInstaQuest&&q.penaltyApplied&&!q.completed))earned.INSTA_FUMBLE=true;
  // THE_REACTOR: reacted to 10+ different quests
  const reactedCount=allQl2.filter(q=>q.reactions&&q.reactions[uid]).length;
  if(reactedCount>=10)earned.THE_REACTOR=true;
  return earned;
}

function questXP(difficulty,bonusEvent){
  const base=DIFF[difficulty]?.xp||100;
  if(bonusEvent?.id==='double')return base*2;
  if(bonusEvent?.id==='legendary')return 250;

function makeApi(url){
  const base=url.replace(/\/$/,'');
  const go=async(path,method='GET',body=null)=>{
    const opts={method,headers:{'Content-Type':'application/json'}};
    if(body!==null)opts.body=JSON.stringify(body);
    const r=await fetch(`${base}/${path}.json`,opts);
    if(!r.ok){const t=await r.text();throw new Error(t);}
    return r.json();
  };
  return{get:p=>go(p),set:(p,d)=>go(p,'PUT',d),patch:(p,d)=>go(p,'PATCH',d),del:p=>go(p,'DELETE')};
}

function Party({api,userId,onDone}){
  const [name,setName]=useState(localStorage.getItem(K.NAME)||'');
  const [mode,setMode]=useState('pick');
  const [code,setCode]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [showAdv,setShowAdv]=useState(false);
  const [customSettings,setCustomSettings]=useState({...DEF});
  const [savedGroups,setSavedGroups]=useState(()=>{try{return JSON.parse(localStorage.getItem(K.GROUPS)||'[]');}catch{return[];}});

  const saveGroup=(pc,n)=>{
    const groups=savedGroups.filter(g=>g.code!==pc);
    groups.unshift({code:pc,name:n});
    const trimmed=groups.slice(0,10);
    localStorage.setItem(K.GROUPS,JSON.stringify(trimmed));
    setSavedGroups(trimmed);
  };
  const removeGroup=(pc)=>{
    const groups=savedGroups.filter(g=>g.code!==pc);
    localStorage.setItem(K.GROUPS,JSON.stringify(groups));
    setSavedGroups(groups);
  };
  const updSetting=k=>e=>setCustomSettings(s=>({...s,[k]:Number(e.target.value)}));

  const create=async()=>{
    if(!name.trim())return setErr('Enter your name first');
    setBusy(true);setErr('');
    try{
      const pc=mkcode();
      await api.set(`parties/${pc}`,{created:Date.now(),settings:{...customSettings},members:{[userId]:{name:name.trim(),joinedAt:Date.now(),selectedTitle:'SLACKER'}}});
      localStorage.setItem(K.NAME,name.trim());
      saveGroup(pc,name.trim());
      onDone(pc,name.trim());
    }catch(e){setErr(e.message);}setBusy(false);
  };
  const join=async()=>{
    if(!name.trim())return setErr('Enter your name first');
    if(!code.trim())return setErr('Enter the party code');
    setBusy(true);setErr('');
    try{
      const pc=code.trim().toUpperCase();
      const party=await api.get(`parties/${pc}`);
      if(!party){setBusy(false);return setErr('Party not found 芒聙聰 check the code!');}
      await api.patch(`parties/${pc}/members/${userId}`,{name:name.trim(),joinedAt:Date.now(),selectedTitle:'SLACKER'});
      localStorage.setItem(K.NAME,name.trim());
      saveGroup(pc,name.trim());
      onDone(pc,name.trim());
    }catch(e){setErr(e.message);}setBusy(false);
  };
  const rejoin=async(gcode,gname)=>{
    const n=name.trim()||gname;
    if(!n)return setErr('Enter your name first');
    setBusy(true);setErr('');
    try{
      const party=await api.get(`parties/${gcode}`);
      if(!party){setBusy(false);return setErr('Party not found 芒聙聰 it may have been deleted.');}
      await api.patch(`parties/${gcode}/members/${userId}`,{name:n,joinedAt:Date.now()});
      localStorage.setItem(K.NAME,n);
      saveGroup(gcode,n);
      onDone(gcode,n);
    }catch(e){setErr(e.message);}setBusy(false);
  };

  return(
    <div className="wrap">
      <div className="hdr"><h1>[ FRIEND QUEST ]</h1><div className="sub">PARTY SETUP</div></div>

      {/* Saved groups */}
      {savedGroups.length>0&&(
        <div className="box">

          {savedGroups.map(g=>(
            <div key={g.code} className="flexb mb6" style={{padding:'8px',background:'var(--card2)',borderRadius:2}}>
              <div>
                <span className="code" style={{fontSize:'.9em',cursor:'default'}}>{g.code}</span>
                <span className="cdim xs" style={{marginLeft:8}}>{g.name}</span>
              </div>
              <div className="flexi gap6">
                <button className="btn-ok" style={{padding:'4px 10px',fontSize:'.75em'}} onClick={()=>rejoin(g.code,g.name)} disabled={busy}>REJOIN 芒聠聮</button>
                <button className="btn-danger" style={{padding:'4px 8px',fontSize:'.72em'}} onClick={()=>removeGroup(g.code)}>芒聹聲</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="box">
        <div className="box-title">IDENTIFY YOURSELF</div>
        <label className="lbl">YOUR NAME</label>
        <input placeholder="Enter your name..." value={name} onChange={e=>setName(e.target.value)} maxLength={20}/>
      </div>
      {err&&<div className="notif err">{err}</div>}

      {mode==='pick'&&(<div className="grid2" style={{marginTop:4}}>
        <div className="picker" onClick={()=>setMode('create')}><div className="icon">芒職聰茂赂聫</div><div className="plabel">CREATE PARTY</div><div className="pdesc">Start a new quest group</div></div>
        <div className="picker" onClick={()=>setMode('join')}><div className="icon">冒聼聰聴</div><div className="plabel">JOIN PARTY</div><div className="pdesc">Enter a party code</div></div>
      </div>)}

      {mode==='create'&&(<div className="box"><div className="box-title">NEW PARTY</div>
        <p className="cdim small mb6">A 6-character party code will be generated for your group.</p>
        <button style={{fontSize:'.75em',marginBottom:8,borderColor:showAdv?'var(--p)':'var(--pd)'}} onClick={()=>setShowAdv(a=>!a)}>
          芒職聶茂赂聫 {showAdv?'芒聳虏 HIDE':'芒聳录 SHOW'} DEADLINE SETTINGS
        </button>
        {showAdv&&(
          <div style={{background:'var(--card2)',padding:'10px',borderRadius:3,marginBottom:10,border:'1px solid var(--border)'}}>
            <div className="cdim xs mb6">QUEST SCHEDULE (can be changed in Settings later)</div>
            <div className="srow"><label>Window opens on</label><select value={customSettings.windowDay} onChange={updSetting('windowDay')}>{DAYS.map((d,i)=><option key={i} value={i}>{h}</option>)}</select></div>
            <div className="srow"><label>Opens at</label><select value={customSettings.windowHour} onChange={updSetting('windowHour')}>{Array.from({length:24},(_,i)=><option key={i} value={i}>{hourLabel(i)}</option>)}</select></div>
            <div className="srow"><label>Duration (days)</label><select value={customSettings.durationDays} onChange={updSetting('durationDays')}>{[1,2,3,4,5,6,7].map(n=><option key={n} value={n}>{n} day{n>1?'s':''}</option>)}</select></div>
            <div className="srow"><label>Deadline time</label><select value={customSettings.deadlineHour} onChange={updSetting('deadlineHour')}>{Array.from({length:24},(_,i)=><option key={i} value={i}>{hourLabel(i)}</option>)}</select></div>
          </div>
        )}
        <button className="btn-big primary" onClick={create} disabled={busy}>{busy?'CREATING...':'[ CREATE PARTY ]'}</button>
        <button onClick={()=>{setMode('pick');setErr('');setShowAdv(false);}}>[ 芒聠聬 BACK ]</button>
      </div>)}

      {mode==='join'&&(<div className="box"><div className="box-title">JOIN PARTY</div>
        <label className="lbl">PARTY CODE</label>
        <input placeholder="e.g. AB3X9Z" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} maxLength={6} onKeyDown={e=>e.key==='Enter'&&join()} style={{letterSpacing:'.22em',fontSize:'1.1em'}}/>

        <button onClick={()=>{setMode('pick');setErr('');}}>[ 芒聠聬 BACK ]</button>
      </div>)}
    </div>
  );
}

    </div>
  );
}

// 芒聲聬芒聲聬芒聲聬 PET TAB 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function PetTab({allQuests,userId,badges,stats}){
  const [section,setSection]=useState('guardian');
  const [itemFilter,setItemFilter]=useState('all');
  const [equipped,setEquipped]=useState(()=>{try{return JSON.parse(localStorage.getItem('ql_pet_eq')||'{}');}catch{return{};}});
  const [archive,setArchive]=useState(()=>{try{return JSON.parse(localStorage.getItem('ql_pet_arc')||'[]');}catch{return[];}});
  // Pet naming
  const petNameKey=`ql_pet_name_${getPetMonthKey()}`;
  const [petNickname,setPetNickname]=useState(()=>localStorage.getItem(petNameKey)||'');
  const [editingName,setEditingName]=useState(false);
  const [nameInput,setNameInput]=useState(petNickname);
  const savePetName=()=>{
    const n=nameInput.trim().slice(0,20);
    setPetNickname(n);
    if(n)localStorage.setItem(petNameKey,n);
    else localStorage.removeItem(petNameKey);
    setEditingName(false);
  };
  // Shop-unlocked pet items from localStorage
  const [shopItems]=useState(()=>{try{return JSON.parse(localStorage.getItem('ql_pet_shop')||'[]');}catch{return[];}});
  const shopPetItems=shopItems.map(id=>SHOP_PET_ITEM_MAP[id]).filter(Boolean);
  const allItemsExtended=[...ALL_PET_ITEMS,...shopPetItems.filter(si=>!ALL_PET_ITEMS.find(i=>i.id===si.id))];

  const currentMonth=new Date().getMonth()+1;
  const pet=MONTHLY_PETS[currentMonth];
  const monthKey=getPetMonthKey();
  const petState=computePetState(allQuests,userId);
  const stateDef=PET_STATES[petState];
  const personality=computePetPersonality(allQuests,userId);
  const personalityDef=PET_PERSONALITIES[personality];
  const petStats={...stats,streak:computeStreak(allQuests,userId).current};
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Archive on first load of a new month
  useEffect(()=>{
    const lastKey=localStorage.getItem('ql_pet_month');
    if(lastKey&&lastKey!==monthKey){
      const prevM=parseInt(lastKey.split('-')[1]);
      const prevPet=MONTHLY_PETS[prevM]||MONTHLY_PETS[1];
      const prevNickname=localStorage.getItem(`ql_pet_name_${lastKey}`)||'';
      const entry={monthKey:lastKey,petName:prevNickname||prevPet.name,defaultName:prevPet.name,emoji:prevPet.emoji,color:prevPet.color,finalState:petState};
      const updated=[entry,...archive].slice(0,12);
      setArchive(updated);
      localStorage.setItem('ql_pet_arc',JSON.stringify(updated));
    }
    localStorage.setItem('ql_pet_month',monthKey);
  },[]);

  const equip=(type,id)=>{
    const ne={...equipped,[type]:equipped[type]===id?null:id};
    setEquipped(ne);
    localStorage.setItem('ql_pet_eq',JSON.stringify(ne));
  };

  const seasonalNow=SEASONAL_ITEMS.filter(i=>i.month===currentMonth);
  const filteredItems=allItemsExtended.filter(item=>{
    if(itemFilter==='seasonal')return!!item.month;
    if(itemFilter==='all')return true;
    return item.type===itemFilter;
  });

  const barColor=petState==='flourishing'?'var(--green)':petState==='stable'?'var(--p)':petState==='strained'?'var(--yellow)':'var(--red)';

  return(
    <div>
      {/* Section tabs */}
      <div className="flex-wrap mb12" style={{gap:6}}>
        {[['guardian','冒聼聬戮 Guardian'],['wardrobe','冒聼聭聴 Wardrobe'],['archive','冒聼聯職 Archive']].map(([s,l])=>(
          <button key={s} className={section===s?'active':''} onClick={()=>setSection(s)}>{l}</button>
        ))}
      </div>

      {section==='guardian'&&(
        <div>
          {/* Pet display card */}
          <div className="box" style={{textAlign:'center',borderColor:pet.color,background:`${pet.color}12`,paddingTop:22,paddingBottom:22}}>
            <div className="cdim xs mb8" style={{letterSpacing:'.12em'}}>{MONTHS[currentMonth-1].toUpperCase()} GUARDIAN</div>
            <PetDisplay pet={pet} state={petState} equipped={equipped} big={true}/>
            <div style={{fontSize:'1.25em',marginTop:14,color:pet.color,letterSpacing:'.06em',fontWeight:'bold'}}>
              {petNickname?petNickname:<span>{pet.name}</span>}
            </div>
            {petNickname&&<div className="cdim xs" style={{marginTop:2}}>({pet.name})</div>}
            {!editingName?(
              <button style={{marginTop:8,fontSize:'.7em',padding:'2px 10px'}} onClick={()=>{setNameInput(petNickname);setEditingName(true);}}>
                {petNickname?'芒聹聫茂赂聫 RENAME PET':'+ NAME YOUR PET'}
              </button>
            ):(
              <div style={{display:'flex',gap:6,marginTop:8,justifyContent:'center',alignItems:'center',flexWrap:'wrap'}}>
                <input style={{width:160,margin:0,padding:'4px 8px',fontSize:'.8em',textAlign:'center'}} maxLength={20}
                  placeholder={pet.name} value={nameInput} onChange={e=>setNameInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')savePetName();if(e.key==='Escape')setEditingName(false);}}
                  autoFocus/>
                <button className="btn-ok" style={{fontSize:'.72em',padding:'4px 10px'}} onClick={savePetName}>SAVE</button>
                <button style={{fontSize:'.72em',padding:'4px 10px'}} onClick={()=>setEditingName(false)}>芒聹聲</button>
              </div>
            )}
            <div className="cdim xs mt6" style={{maxWidth:260,margin:'6px auto 0'}}>{pet.desc}</div>
          </div>
          {/* Health + state */}
          <div className="box mt6">
            <div className="flexb mb6">
              <span style={{color:stateDef.color,fontSize:'.88em',letterSpacing:'.07em'}}>{stateDef.icon} {stateDef.label}</span>
              <span style={{fontSize:'.78em'}}>{personalityDef.icon} {personalityDef.name}</span>
            </div>
            <div className="cdim xs mb4" style={{fontSize:'.68em'}}>HEALTH</div>
            <div className="pet-bar"><div className="fill" style={{width:`${stateDef.healthPct}%`,background:barColor}}/></div>
            <div className="cdim xs mt6" style={{fontSize:'.78em'}}>{stateDef.desc}</div>
            <div className="cdim xs mt4" style={{fontSize:'.72em',fontStyle:'italic',color:'var(--dim)'}}>"{personalityDef.desc}"</div>
          </div>
          {/* Stats row */}
          <div className="grid3 mt6">
            <div className="summary-stat"><div className="s-val">{petStats.completed}</div><div className="s-lbl">Quests Done</div></div>
            <div className="summary-stat"><div className="s-val" style={{color:'var(--yellow)'}}>{petStats.streak}</div><div className="s-lbl">Week Streak</div></div>
            <div className="summary-stat"><div className="s-val">{petStats.xp}</div><div className="s-lbl">Total XP</div></div>
          </div>
          {petState==='flourishing'&&<div className="notif ok mt10" style={{textAlign:'center'}}>芒聹篓 Your guardian is FLOURISHING! On fire right now 冒聼聰楼</div>}
          {petState==='critical'&&<div className="notif warn mt10" style={{textAlign:'center'}}>芒職聽茂赂聫 Your guardian is barely holding on. Complete quests before it's too late!</div>}
          {petState==='lost'&&<div className="notif err mt10" style={{textAlign:'center'}}>冒聼聭禄 Your guardian is a spirit now. Complete quests to bring it back to life.</div>}
        </div>
      )}

      {section==='wardrobe'&&(
        <div>
          {seasonalNow.length>0&&(
            <div className="notif purple mb10">
              冒聼聨聣 Limited-time {seasonalNow.map(i=>i.seasonName).filter((v,i,a)=>a.indexOf(v)===i).join(' / ')} items available this month!
            </div>
          )}
          <div className="flex-wrap mb10" style={{gap:4}}>
            {['all','hat','wings','collar','aura','seasonal'].map(f=>(
              <button key={f} className={itemFilter===f?'active':''} style={{padding:'3px 9px',fontSize:'.73em'}} onClick={()=>setItemFilter(f)}>{f.toUpperCase()}</button>
            ))}
          </div>
          <div className="item-grid">
            {filteredItems.map(item=>{
              const seasonal=!!item.month;
              const isShopItem=shopItems.includes(item.id);
              const unlocked=isShopItem||isPetItemUnlocked(item,petStats,badges);
              const isEquipped=equipped[item.type]===item.id;
              return(
                <div key={item.id}
                  className={`item-card ${unlocked?'unlocked':''} ${isEquipped?'equipped':''} ${seasonal?'seasonal':''} ${!unlocked?'locked':''}`}
                  onClick={()=>unlocked&&equip(item.type,item.id)}
                >
                  <div style={{fontSize:'1.9em',marginBottom:4}}>{item.icon}</div>
                  <div style={{fontSize:'.72em',letterSpacing:'.02em',marginBottom:3}}>{item.name}</div>
                  {seasonal&&<div style={{fontSize:'.63em',color:'var(--purple)'}}>{item.seasonName}</div>}
                  {isEquipped&&<div style={{fontSize:'.62em',color:'var(--yellow)',marginTop:2}}>芒聹聯 EQUIPPED</div>}
                  {!unlocked&&!seasonal&&<div style={{fontSize:'.62em',color:'var(--dim)',marginTop:2}}>{item.unlockDesc}</div>}
                  {!unlocked&&seasonal&&<div style={{fontSize:'.62em',color:'var(--dim)',marginTop:2}}>Available in {MONTHS[item.month-1]}</div>}
                </div>
              );
            })}
          </div>
          {filteredItems.length===0&&<div className="empty mt12"><div className="ei">冒聼聰聮</div><div>No items here</div></div>}
          <div className="notif mt12" style={{fontSize:'.75em'}}>冒聼聮隆 Items are unlocked by completing quests, earning badges, and maintaining streaks. Extra cosmetics can be purchased in the 冒聼聫陋 Shop tab with your coins!</div>
        </div>
      )}

      {section==='archive'&&(
        <div>
          {/* Current month always shown first */}
          <div className="archive-card" style={{borderColor:pet.color,background:`${pet.color}0a`}}>
            <div style={{fontSize:'2.5em'}}><PetDisplay pet={pet} state={petState} equipped={equipped} big={false}/></div>
            <div style={{flex:1}}>
              <div style={{color:pet.color,fontSize:'.9em',fontWeight:'bold'}}>{pet.name}</div>
              <div className="cdim xs">{MONTHS[currentMonth-1]} {new Date().getFullYear()} 芒聙聰 CURRENT</div>
              <div style={{fontSize:'.76em',marginTop:3}}><span style={{color:stateDef.color}}>{stateDef.icon} {stateDef.label}</span></div>
            </div>
          </div>
          {archive.length===0&&(
            <div className="empty mt12"><div className="ei">冒聼聯聟</div><div>No past guardians yet</div><div className="cdim small mt6">Previous months' pets will appear here</div></div>
          )}
          {archive.map(entry=>{
            const m=parseInt(entry.monthKey.split('-')[1]);
            const y=entry.monthKey.split('-')[0];
            const s=PET_STATES[entry.finalState]||PET_STATES.stable;
            const isLost=entry.finalState==='lost';
            return(
              <div key={entry.monthKey} className={`archive-card ${isLost?'spirit':''}`}>
                <div style={{fontSize:'2.4em',filter:isLost?'grayscale(1)':undefined}}>{entry.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{color:entry.color||'var(--p)',fontSize:'.9em',fontWeight:'bold'}}>{entry.petName}</div>
                  {entry.defaultName&&entry.petName!==entry.defaultName&&<div className="cdim xs" style={{fontSize:'.68em'}}>({entry.defaultName})</div>}
                  <div className="cdim xs">{MONTHS[m-1]} {y}</div>
                  <div style={{fontSize:'.76em',marginTop:3}}>
                    <span style={{color:s.color}}>{s.icon} {s.label}</span>
                    {isLost&&<span className="cdim xs" style={{marginLeft:8}}>冒聼聭禄 Became a spirit</span>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// 芒聲聬芒聲聬芒聲聬 SHOP TAB 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function ShopTab({api,partyCode,userId,members,addToast,partyData}){
  const member=members[userId]||{};
  const coins=member.coins||0;
  const activeBoosts=member.activeBoosts||{};
  const [buying,setBuying]=useState(null);
  const [ownedPetItems,setOwnedPetItems]=useState(()=>{try{return JSON.parse(localStorage.getItem('ql_pet_shop')||'[]');}catch{return[];}});
  const [buyConfirm,setBuyConfirm]=useState(null);

  const handleBuy=async(item)=>{
    if(buying||coins<item.price)return;
    setBuying(item.id);
    try{
      const newCoins=coins-item.price;
      if(item.type==='consumable'){
        if(item.id==='shop_box'){
          await api.patch(`parties/${partyCode}/members/${userId}`,{
            coins:newCoins,
            mysteryBoxes:(member.mysteryBoxes||0)+1
          });
          addToast('冒聼聯娄 MYSTERY BOX!','Box added 芒聙聰 open it in Profile!','var(--purple)');
        } else if(item.id==='xp_boost_1'||item.id==='xp_boost_2'){
          const boostUpdate={coins:newCoins};
          boostUpdate[`activeBoosts/${item.id}`]=true;
          await api.patch(`parties/${partyCode}/members/${userId}`,boostUpdate);
          addToast(`${item.icon} BOOST ACTIVE!`,`${item.name} is ready 芒聙聰 complete a quest!`,'var(--p)');
        } else if(item.id==='streak_freeze'){
          const boostUpdate={coins:newCoins};
          boostUpdate[`activeBoosts/streak_freeze`]=true;
          await api.patch(`parties/${partyCode}/members/${userId}`,boostUpdate);
          addToast('冒聼搂聤 STREAK FROZEN!','Your streak is protected for the next week.','var(--p)');
        }
      } else if(item.type.startsWith('pet_')){
        // Pet cosmetic 芒聙聰 store in localStorage
        const newOwned=[...ownedPetItems.filter(i=>i!==item.id),item.id];
        setOwnedPetItems(newOwned);
        localStorage.setItem('ql_pet_shop',JSON.stringify(newOwned));
        await api.patch(`parties/${partyCode}/members/${userId}`,{coins:newCoins});
        addToast(`${item.icon} UNLOCKED!`,`${item.name} added to your Wardrobe!`,'var(--yellow)');
      }
    }catch(e){console.error(e);addToast('ERROR','Purchase failed 芒聙聰 try again','var(--red)');}
    setBuying(null);setBuyConfirm(null);
  };

  const consumables=SHOP_ITEMS.filter(i=>i.type==='consumable');
  const petCosmetics=SHOP_ITEMS.filter(i=>i.type.startsWith('pet_'));

  const isOwned=(item)=>{
    if(item.type.startsWith('pet_'))return ownedPetItems.includes(item.id);
    if(item.id==='xp_boost_1')return!!activeBoosts.xp_boost_1;
    if(item.id==='xp_boost_2')return!!activeBoosts.xp_boost_2;
    if(item.id==='streak_freeze')return!!activeBoosts.streak_freeze;
    return false;
  };

  return(
    <div>
      <div className="box" style={{borderColor:'var(--yellow)',background:'rgba(251,191,36,.03)',marginBottom:8}}>
        <div className="flexb">
          <span className="box-title cyellow" style={{margin:0,border:'none',padding:0}}>冒聼聫陋 THE QUEST SHOP</span>
          <span className="coin-badge" style={{fontSize:'.9em',padding:'5px 12px'}}>冒聼陋聶 {coins} coins</span>
        </div>
        <div className="cdim xs mt6">Earn coins by completing quests. Spend them on boosts, boxes, and pet cosmetics!</div>
        <div className="flex-wrap mt8" style={{gap:4}}>
          {Object.entries(COIN_REWARDS).map(([diff,c])=>(
            <span key={diff} className="ibadge" style={{background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.25)',color:'var(--yellow)'}}>{diff}: +{c}冒聼陋聶</span>
          ))}
        </div>
      </div>

      <div className="box mb8">
        <div className="box-title">芒職隆 CONSUMABLES</div>
        <div className="shop-grid">
          {consumables.map(item=>{
            const owned=isOwned(item);
            const canAfford=coins>=item.price;

function WeeklySummaryModal({summary,members,allQuests,userId,onClose}){
  const {weekId}=summary;
  const wq=allQuests[weekId]||{};
  const qlist=Object.values(wq);
  const myStats={
    done:qlist.filter(q=>q.assignedTo===userId&&q.completed).length,
    fail:qlist.filter(q=>q.assignedTo===userId&&q.penaltyApplied&&!q.completed).length,
    xp:qlist.filter(q=>q.assignedTo===userId&&q.completed).reduce((a,q)=>a+(q.xpAwarded||XP_WIN),0),
  };
  const wqBoard=allQuests[weekId]||{};
  const board=Object.entries(members).map(([id,m])=>{
    const mine=Object.values(wqBoard).filter(q=>q.assignedTo===id);
    const done=mine.filter(q=>q.completed).length;
    const rate=mine.length>0?done/mine.length:0;
    const s=computeStats(allQuests,id);
    return{id,name:m.name,xp:s.xp,rate,done,total:mine.length};
  }).filter(m=>m.total>0).sort((a,b)=>b.rate-a.rate||b.done-a.done||b.xp-a.xp);
  const winner=board[0];
  return(
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:520}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:'1.8em',letterSpacing:'.2em',color:'var(--yellow)',textShadow:'0 0 20px rgba(251,191,36,.5)'}}>[ WEEK COMPLETE ]</div>
          <div className="cdim xs">Week of {weekId}</div>
        </div>
        <div className="grid3 mb12">
          <div className="summary-stat"><div className="s-val">{myStats.done}</div><div className="s-lbl">Quests Done</div></div>
          <div className="summary-stat"><div className="s-val" style={{color:'var(--red)'}}>{myStats.fail}</div><div className="s-lbl">Failed</div></div>
          <div className="summary-stat"><div className="s-val">+{myStats.xp}</div><div className="s-lbl">XP Earned</div></div>
        </div>
        {winner&&<div className="box" style={{borderColor:'var(--yellow)',background:'rgba(251,191,36,.04)',textAlign:'center',marginBottom:10}}>
          <div className="cyellow bold">冒聼聭聭 WEEKLY WINNER</div>
          <div style={{fontSize:'1.3em',marginTop:6,color:'var(--pb)'}}>{winner.name}</div>
          <div className="cdim xs">{Math.round(winner.rate*100)}% completion ({winner.done}/{winner.total} quests)</div>
        </div>}
        {myStats.fail>0&&<div className="notif warn mb6">You failed {myStats.fail} quest{myStats.fail>1?'s':''} this week. The Hall of Shame remembers. 冒聼聵聢</div>}
        {myStats.fail===0&&myStats.done>0&&<div className="notif ok mb6">Perfect week! Zero failures. You're built different. 冒聼聮聨</div>}
        <button className="btn-big primary" onClick={onClose}>[ CONTINUE TO THIS WEEK ]</button>
      </div>
    </div>
  );
}

function AssignTab({api,partyCode,userId,members,quests,weekId,inWindow,maxPer,pendingProofs,onApprove,onReject}){
  const [title,setTitle]=useState('');
  const [to,setTo]=useState('');
  const [diff,setDiff]=useState('medium');
  const [requireProof,setRequireProof]=useState(false);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [showSugg,setShowSugg]=useState(false);
  const [reviewQuest,setReviewQuest]=useState(null);
  const [reviewedIds,setReviewedIds]=useState(new Set());

  const others=Object.entries(members).filter(([id])=>id!==userId);
  const myAssign=Object.values(quests).filter(q=>q.assignedBy===userId);
  const countFor=id=>myAssign.filter(q=>q.assignedTo===id).length;

  const assign=async()=>{
    if(!title.trim())return setErr('Quest title is required');
    if(!to)return setErr('Select who to assign to');
    if(countFor(to)>=maxPer)return setErr(`Max ${maxPer} quests per person`);
    setBusy(true);setErr('');setOk('');
    try{
      const qid=mkid();
      const penOpts=[];
      while(penOpts.length<3){const p=rnd(PENALTIES);if(!penOpts.includes(p))penOpts.push(p);}
      await api.set(`parties/${partyCode}/quests/${weekId}/${qid}`,{
        title:title.trim(),assignedBy:userId,assignedTo:to,difficulty:diff,requireProof,
        completed:false,completedAt:null,penaltyApplied:false,penaltyOptions:penOpts,penaltyChosen:null,
        proof:null,proofStatus:null,proofRejectedReason:null,reactions:{},createdAt:Date.now(),xpAwarded:null,
      });
      setTitle('');setOk(`Quest assigned to ${members[to]?.name}! 芒聹聯`);setTimeout(()=>setOk(''),3000);
    }catch(e){setErr(e.message);}setBusy(false);
  };

  const myPendingProofs=pendingProofs.filter(q=>q.assignedBy===userId&&!reviewedIds.has(q.id));

  return(
    <div>
      {reviewQuest&&(<ProofReviewModal quest={reviewQuest} members={members}
        onApprove={id=>{setReviewedIds(s=>new Set([...s,id]));onApprove(id);setReviewQuest(null);}}
        onReject={(id,r)=>{setReviewedIds(s=>new Set([...s,id]));onReject(id,r);setReviewQuest(null);}}
        onClose={()=>setReviewQuest(null)}/>)}

      {myPendingProofs.length>0&&(<div className="box" style={{borderColor:'var(--yellow)'}}>
        <div className="box-title cyellow">芒聫鲁 PROOFS AWAITING YOUR REVIEW ({myPendingProofs.length})</div>
        {myPendingProofs.map(q=>(
          <div key={q.id} className="qcard pending-proof">
            <div className="flexb">
              <div><div className="bold wrap-word">{q.title}</div>
                <div className="cdim xs">from: <span className="cp">{members[q.assignedTo]?.name}</span></div>
              </div>
              <button className="btn-yellow" onClick={()=>setReviewQuest(q)}>REVIEW</button>
            </div>
          </div>
        ))}
      </div>)}

      <div className="box">
        <div className="box-title">芒聹聫茂赂聫 ASSIGN A QUEST</div>
        {!inWindow&&<div className="notif warn mb6">芒職聽 Quest window is closed but you can still assign for next window.</div>}
        <label className="lbl">QUEST CHALLENGE</label>
        <div style={{position:'relative'}}>
          <input placeholder="e.g. Do 20 push-ups before noon" value={title} onChange={e=>setTitle(e.target.value)} maxLength={120}/>
          <button style={{position:'absolute',right:0,top:3,fontSize:'.72em'}} onClick={()=>setShowSugg(s=>!s)}>冒聼聮隆 SUGGEST</button>
        </div>
        {showSugg&&(
          <div className="box" style={{marginTop:0,marginBottom:8}}>
            {Object.entries(SUGGESTIONS).map(([cat,items])=>(
              <div key={cat} className="mb6">
                <div className="cdim xs bold mb6">{cat}</div>
                <div className="flex-wrap">
                  {items.map((s,i)=>(
                    <button key={i} style={{fontSize:'.72em',padding:'3px 7px'}} onClick={()=>{setTitle(s);setShowSugg(false);}}>{s}</button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
        <label className="lbl">DIFFICULTY & REWARD</label>
        <div className="flex-wrap mb6">
          {Object.entries(DIFF).map(([k,v])=>(
            <button key={k} className={diff===k?'primary':''} onClick={()=>setDiff(k)} style={{fontSize:'.75em'}}>
              {v.icon} {v.label} <span className="cyellow">({v.xp} XP)</span>
            </button>
          ))}
        </div>
        <label className="lbl">ASSIGN TO</label>
        <select value={to} onChange={e=>setTo(e.target.value)}>
          <option value="">-- SELECT MEMBER --</option>
          {others.map(([id,m])=><option key={id} value={id} disabled={countFor(id)>=maxPer}>{m.name} ({countFor(id)}/{maxPer}{countFor(id)>=maxPer?' 芒聙聰 FULL':''})</option>)}
        </select>
        <div className="flexi gap6 mb6" style={{cursor:'pointer'}} onClick={()=>setRequireProof(r=>!r)}>
          <div style={{width:16,height:16,border:`1px solid ${requireProof?'var(--p)':'var(--pd)'}`,borderRadius:2,background:requireProof?'var(--p)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            {requireProof&&<span style={{color:'var(--bg)',fontSize:'.7em'}}>芒聹聯</span>}
          </div>
          <span className="small">Require photo/text proof to complete</span>
        </div>
        {err&&<div className="notif err">{err}</div>}
        {ok&&<div className="notif ok">{ok}</div>}
        <button className="btn-big primary" onClick={assign} disabled={busy}>{busy?'ASSIGNING...':'[ ASSIGN QUEST ]'}</button>
      </div>

      <div className="box">
        <div className="box-title cdim">ASSIGNMENT STATUS THIS WEEK</div>
        {others.length===0&&<div className="cdim small">No other members 芒聙聰 share your party code!</div>}
        {others.map(([id,m])=>{const n=countFor(id),full=n>=maxPer;return(
          <div key={id} className="flexb mb6">
            <span className="cp">{m.name}</span>
            <div className="flexi gap6">
              {Array.from({length:Math.min(maxPer,8)},(_,i)=><span key={i} className={i<n?'cp':'cdim'}>{i<n?'芒聳聽':'芒聳隆'}</span>)}
              <span className="cdim xs">({n}/{maxPer})</span>

}

// 芒聲聬芒聲聬芒聲聬 QUEST LOG TAB (with reactions) 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function QuestLogTab({quests,members,userId,weekId,api,partyCode}){
  const list=Object.entries(quests).map(([id,q])=>({id,...q})).sort((a,b)=>a.createdAt-b.createdAt);
  const toggleReaction=async(questId,emoji)=>{
    const q=quests[questId];
    const current=q?.reactions?.[userId];
    const val=current===emoji?null:emoji;
    await api.patch(`parties/${partyCode}/quests/${weekId}/${questId}/reactions`,{[userId]:val});
  };
  return(
    <div className="box">
      <div className="box-title glow">[ FRIEND QUEST ] // WEEK: {weekId}</div>
      {list.length===0?(<div className="empty"><div className="ei">冒聼聯聹</div><div className="cdim">NO ENTRIES YET</div></div>)
      :list.map((q,i)=>(
        <div key={q.id} className="log-e">
          <div className="ll"><span className="cdim">QUEST_ID: </span><span className="cyellow">#{String(i).padStart(3,'0')}</span>
            <span className={`diff ${getDiffClass(q.difficulty)}`} style={{marginLeft:8}}>{DIFF[q.difficulty]?.icon} {DIFF[q.difficulty]?.label}</span>
          </div>
          <div className="ll"><span className="cdim">NAME: </span><span className="cpb bold">{q.title}</span></div>
          <div className="ll"><span className="cdim">ASSIGNED_TO: </span><span className="cgreen">{members[q.assignedTo]?.name||'???'}</span></div>
          <div className="ll"><span className="cdim">ASSIGNED_BY: </span><span>{members[q.assignedBy]?.name||'???'}</span></div>
          <div className="ll"><span className="cdim">STATUS: </span>
            {q.completed?<span className="cgreen glow-g bold">**COMPLETE** 芒聹聯</span>
            :q.proofStatus==='pending'?<span className="cyellow">AWAITING PROOF REVIEW...</span>
            :q.penaltyApplied?<span className="cred glow-r bold">**FAILED** // -{XP_LOSE} XP</span>
            :<span className="cyellow">IN_PROGRESS<span className="blink">_</span></span>}
          </div>
          {q.completedAt&&<div className="ll cdim xs">TIMESTAMP: {dateFmt(q.completedAt)}</div>}
          {q.penaltyChosen&&<div className="ll cred xs">PUNISHMENT: {q.penaltyChosen}</div>}
          <div className="reaction-bar">
            {RXNS.map(emoji=>{
              const rxns=q.reactions||{};
              const count=Object.values(rxns).filter(r=>r===emoji).length;
              const mine=rxns[userId]===emoji;
              return(<div key={emoji} className={`rxn ${mine?'mine':''}`} onClick={()=>toggleReaction(q.id,emoji)}>
                <span>{emoji}</span>{count>0&&<span className="rxn-count">{count}</span>}
              </div>);
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

          const isMe=m.id===userId;

        {shamed.map(m=>(
          <div key={m.id} className="flexb mb6" style={{padding:'8px',border:'1px solid #3a0015',borderRadius:2}}>

function BadgesTab({allQuests,userId,members,savedBadges,onAward}){
  const earned=checkBadges(allQuests,userId,members);
  const secretEarned=checkSecretBadges(allQuests,userId,members);
  useEffect(()=>{
    const newReg=Object.keys(earned).filter(b=>!savedBadges[b]);

        <div className="badge-grid">
          {Object.entries(BADGE_DEFS).map(([id,def])=>{

              <div key={id} className={`b-card ${isUnlocked?'unlocked':'locked'}`}>

                <div className="b-name" style={{color:isUnlocked?RARITY_COLOR[def.rarity]:'var(--dim)'}}>{def.name}</div>

              </div>

      </div>
      <div className="box" style={{borderColor:'rgba(168,85,247,.3)',background:'rgba(168,85,247,.03)'}}>

        <div className="badge-grid">

              </div>
            );
          })}

      </div>
    </div>
  );
}

  const streak=computeStreak(allQuests,userId);
  const badges=checkBadges(allQuests,userId,members);
  const unlocked=getUnlockedTitles(stats,badges,streak);

  const coins=member.coins||0;
  const [openingBox,setOpeningBox]=useState(false);
  const [boxResult,setBoxResult]=useState(null);
  const [editingAvatar,setEditingAvatar]=useState(false);
  const [selEmoji,setSelEmoji]=useState(member.avatarEmoji||'');
  const [selBg,setSelBg]=useState(member.avatarBg||avatarColor(member.name));
  const [savingAvatar,setSavingAvatar]=useState(false);

  const openBox=async()=>{
    if(boxes<1||openingBox)return;
    setOpeningBox(true);
    const reward=rnd(BOX_REWARDS);
    setBoxResult(reward);
    await api.patch(`parties/${partyCode}/members/${userId}`,{
      mysteryBoxes:Math.max(0,boxes-1),
    });
    setOpeningBox(false);
  };

  const setTitle=async(tid)=>{
    await api.patch(`parties/${partyCode}/members/${userId}`,{selectedTitle:tid});
    onTitleChange(tid);
  };

  const saveAvatar=async()=>{
    setSavingAvatar(true);
    await api.patch(`parties/${partyCode}/members/${userId}`,{avatarEmoji:selEmoji||null,avatarBg:selBg});
    setSavingAvatar(false);
    setEditingAvatar(false);
  };

  const weeklyData=Object.entries(allQuests).map(([wk,wq])=>{
    const mine=Object.values(wq||{}).filter(q=>q.assignedTo===userId);

                <div key={em} className={`av-opt ${selEmoji===em?'sel':''}`} onClick={()=>setSelEmoji(selEmoji===em?'':em)}>{em}</div>

  const [result,setResult]=useState(null);
  const [alreadySpun,setAlreadySpun]=useState(false);

function ChatTab({api,partyCode,userId,members,chatMessages,onSend,enabled}){
  const [text,setText]=useState('');
  const [busy,setBusy]=useState(false);
  const bottomRef=useRef(null);
  const memberColorMap=['#0ea5e9','#6366f1','#8b5cf6','#ec4899','#10b981','#f59e0b','#ef4444'];
  const getMemberColor=uid=>{const ids=Object.keys(members);return memberColorMap[ids.indexOf(uid)%memberColorMap.length];};

  useEffect(()=>{
    bottomRef.current?.scrollIntoView({behavior:'smooth'});
  },[chatMessages.length]);

  const send=async()=>{
    if(!text.trim()||busy)return;
    setBusy(true);
    try{await onSend(text.trim());setText('');}catch(e){console.error(e);}
    setBusy(false);
  };

  if(!enabled){
    return(
      <div className="empty" style={{padding:50}}>
        <div className="ei">冒聼聮卢</div>
        <div>Group Chat is turned off</div>
        <div className="cdim small mt6">A party member can enable it in Settings.</div>
      </div>
    );
  }

  return(
    <div>
      <div className="box" style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'10px 12px 6px',borderBottom:'1px solid var(--border)'}}>
          <span className="box-title" style={{border:'none',padding:0,margin:0}}>冒聼聮卢 GROUP CHAT</span>
          <span className="cdim xs" style={{marginLeft:8}}>Real-time 脗路 {Object.keys(members).length} members</span>
        </div>
        <div className="chat-area">
          {chatMessages.length===0&&(
            <div className="empty" style={{padding:24}}>
              <div className="ei">冒聼聮卢</div>
              <div className="cdim small">No messages yet 芒聙聰 start the conversation!</div>
            </div>
          )}
          {chatMessages.map((msg,i)=>{
            const isMe=msg.uid===userId;
            const memberName=members[msg.uid]?.name||msg.name||'???';
            const showName=!isMe&&(i===0||chatMessages[i-1]?.uid!==msg.uid);
            return(
              <div key={msg.id||i} style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start',marginBottom:8}}>
                {showName&&<div style={{fontSize:'.7em',color:getMemberColor(msg.uid),marginBottom:2,marginLeft:4}}>{memberName}</div>}
                <div className={`chat-bubble ${isMe?'mine':'theirs'}`}>{msg.text}</div>
                <div style={{fontSize:'.62em',color:'var(--dim)',marginTop:2,marginLeft:4,marginRight:4}}>{dateFmt(msg.ts)}</div>
              </div>
            );
          })}
          <div ref={bottomRef}/>
        </div>
        <div className="chat-input-row">
          <input style={{flex:1,margin:0}} placeholder="Type a message..." value={text}
            onChange={e=>setText(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            maxLength={500}/>
          <button className="btn-ok" onClick={send} disabled={busy||!text.trim()} style={{flexShrink:0,margin:0,padding:'7px 14px'}}>
            {busy?'...':'SEND 芒聠聮'}
          </button>
        </div>
      </div>
    </div>
  );
}
