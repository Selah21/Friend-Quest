          <div className="cdim xs mb6">SCHEDULE PREVIEW</div>
          <div>Window: <span className="cp">{DAYS[local.windowDay]} at {hourLabel(local.windowHour)}</span></div>
          <div>Deadline: <span className="cyellow">{DAYS[(local.windowDay+local.durationDays)%7]} at {hourLabel(local.deadlineHour)}:59</span></div>
        </div>
        {err&&<div className="notif err">{err}</div>}
        {ok&&<div className="notif ok">{ok}</div>}
        <div className="flexi gap6 mt6">
          <button className="btn-big primary" style={{flex:2}} onClick={save} disabled={busy}>{busy?'SAVING...':'[ SAVE SETTINGS ]'}</button>
          <button style={{flex:1}} onClick={()=>setLocal({...DEF})}>[ RESET ]</button>
        </div>
      </div>
    </div>
  );
}

// 芒聲聬芒聲聬芒聲聬 GAME 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function Game({api,userId,partyCode,userName,onLeave,onSwitchParty}){
  const [tab,setTab]=useState('quests');
  const [partyData,setPartyData]=useState(null);
  const [allQuests,setAllQuests]=useState({});
  const [loading,setLoading]=useState(true);
  const [completing,setCompleting]=useState(null);
  const [copied,setCopied]=useState(false);
  const [,setTick]=useState(0);
  const [settings,setSettings]=useState({...DEF});
  const [toasts,setToasts]=useState([]);
  const [showSummary,setShowSummary]=useState(false);
  const [summaryWeek,setSummaryWeek]=useState(null);
  const [chatMessages,setChatMessages]=useState([]);
  const [chatUnread,setChatUnread]=useState(0);
  const [showFeedback,setShowFeedback]=useState(false);
  const [showSwitcher,setShowSwitcher]=useState(false);
  const [savedGroups]=useState(()=>{try{return JSON.parse(localStorage.getItem(K.GROUPS)||'[]');}catch{return[];}});
  const chatLastSeenRef=useRef(parseInt(localStorage.getItem(K.CHAT_TS)||'0'));
  const instaFiredRef=useRef(false);

  useEffect(()=>{const t=setInterval(()=>setTick(n=>n+1),1000);return()=>clearInterval(t);},[]);

  const addToast=(title,msg,color,dur=4000)=>{
    const id=mkid();
    setToasts(t=>[...t,{id,title,msg,color}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),dur);
  };

  const poll=useCallback(async()=>{
    try{
      const [party,aq]=await Promise.all([api.get(`parties/${partyCode}`),api.get(`parties/${partyCode}/quests`)]);
      if(party){setPartyData(party);if(party.settings)setSettings(s=>({...DEF,...party.settings}));}
      const aqs=aq||{};setAllQuests(aqs);setLoading(false);
      const wi=getWeekInfo(party?.settings);
      if(wi.expired&&aqs[wi.id]){
        const expired=Object.entries(aqs[wi.id]).filter(([,q])=>!q.completed&&!q.penaltyApplied&&q.proofStatus!=='approved');
        for(const [qid] of expired)await api.patch(`parties/${partyCode}/quests/${wi.id}/${qid}`,{penaltyApplied:true});
      }
      // Check weekly summary
      const lastSeen=localStorage.getItem(K.WEEK);
      const prevWeeks=Object.keys(aqs).filter(wk=>wk<wi.id).sort();
      const mostRecentPrevWeek=prevWeeks[prevWeeks.length-1];
      if(mostRecentPrevWeek&&mostRecentPrevWeek!==lastSeen&&aqs[mostRecentPrevWeek]){
        setSummaryWeek(mostRecentPrevWeek);setShowSummary(true);
        localStorage.setItem(K.WEEK,mostRecentPrevWeek);
      }
      // 芒聰聙芒聰聙 INSTA-QUEST: auto-assign when 2 hours or less left 芒聰聙芒聰聙
      if(wi.inWindow&&wi.hoursLeft<=2&&wi.hoursLeft>0&&!instaFiredRef.current){
        const alreadyDone=party?.instaQuests?.[wi.id]?.[userId];
        if(!alreadyDone){
          instaFiredRef.current=true;
          const cats=Object.keys(SUGGESTIONS);
          const cat=rnd(cats);
          const title=rnd(SUGGESTIONS[cat]);
          const qid=mkid();
          const penOpts=[];
          while(penOpts.length<3){const p=rnd(PENALTIES);if(!penOpts.includes(p))penOpts.push(p);}
          await api.set(`parties/${partyCode}/quests/${wi.id}/${qid}`,{
            title,assignedBy:'SYSTEM',assignedTo:userId,difficulty:'medium',requireProof:false,
            completed:false,completedAt:null,penaltyApplied:false,penaltyOptions:penOpts,penaltyChosen:null,
            proof:null,proofStatus:null,proofRejectedReason:null,reactions:{},createdAt:Date.now(),xpAwarded:null,
            isInstaQuest:true,
          });
          await api.patch(`parties/${partyCode}/instaQuests/${wi.id}`,{[userId]:true});
          addToast('芒職隆 INSTA-QUEST!',`"${title}" 芒聙聰 auto-assigned! ${Math.floor(wi.hoursLeft*60)} min left 冒聼聰楼`,'var(--yellow)',8000);
        }
      }
      // 芒聰聙芒聰聙 CHAT: fetch messages 芒聰聙芒聰聙
      try{
        const chatData=await api.get(`parties/${partyCode}/chat`);
        const msgs=Object.entries(chatData||{}).map(([id,m])=>({id,...m})).sort((a,b)=>a.ts-b.ts);
        setChatMessages(msgs);
        const lastSeen2=chatLastSeenRef.current;
        setChatUnread(msgs.filter(m=>m.ts>lastSeen2&&m.uid!==userId).length);
      }catch(_){}
    }catch(e){console.warn(e);}
  },[partyCode]);

  useEffect(()=>{poll();const t=setInterval(poll,4500);return()=>clearInterval(t);},[poll]);

  const completeQuest=async(qid,difficulty)=>{
    setCompleting(qid);
    const wi=getWeekInfo(settings);
    const bonusEvent=getBonusEvent(wi.id);
    let xp=questXP(difficulty,bonusEvent);
    // Combo check
    const todayDone=Object.values(allQuests[wi.id]||{}).filter(q=>q.assignedTo===userId&&q.completed&&q.completedAt&&new Date(q.completedAt).toDateString()===new Date().toDateString()).length;
    const comboBonus=todayDone>=2?25:0;
    // XP boost check
    const myMember=partyData?.members?.[userId]||{};
    const activeBoosts=myMember.activeBoosts||{};
    let boostUsed=null;
    if(activeBoosts.xp_boost_2){xp=Math.round(xp*2);boostUsed='xp_boost_2';}
    else if(activeBoosts.xp_boost_1){xp=Math.round(xp*1.5);boostUsed='xp_boost_1';}
    // Coins to award
    const coinsEarned=COIN_REWARDS[difficulty]||10;
    const currentCoins=myMember.coins||0;
    try{
      await api.patch(`parties/${partyCode}/quests/${wi.id}/${qid}`,{completed:true,completedAt:Date.now(),xpAwarded:xp+comboBonus});
      // Update coins & clear boost if used
      const memberUpdate={coins:currentCoins+coinsEarned};
      if(boostUsed){memberUpdate[`activeBoosts/${boostUsed}`]=null;}
      await api.patch(`parties/${partyCode}/members/${userId}`,memberUpdate);
      addToast('芒聹聯 QUEST COMPLETE!',`${rnd(FUNNY_COMPLETE)} +${xp+comboBonus} XP 脗路 +${coinsEarned}冒聼陋聶`,'var(--green)');
      if(comboBonus>0)addToast('冒聼聰楼 COMBO BONUS!',`${todayDone+1} quests today! +${comboBonus} XP bonus`,'var(--purple)');
      if(boostUsed)addToast(`${boostUsed==='xp_boost_2'?'冒聼聮楼':'芒職隆'} BOOST ACTIVATED!`,`${boostUsed==='xp_boost_2'?'2脙聴':'1.5脙聴'} XP boost used!`,'var(--p)');
      // Mystery box for hard/legendary
      if(difficulty==='legendary'||(difficulty==='hard'&&Math.random()<0.3)){
        await api.patch(`parties/${partyCode}/members/${userId}`,{mysteryBoxes:(myMember.mysteryBoxes||0)+1});
        addToast('冒聼聯娄 MYSTERY BOX!','Check your Profile to open it!','var(--purple)');
      }
    }catch(e){console.error(e);}setCompleting(null);
  };

  const submitProof=async(qid,proof)=>{
    const wi=getWeekInfo(settings);
    await api.patch(`parties/${partyCode}/quests/${wi.id}/${qid}`,{proof,proofStatus:'pending'});
    addToast('冒聼聯赂 PROOF SUBMITTED','Waiting for the assigner to review...','var(--yellow)');
  };

  const approveProof=async(qid)=>{
    const wi=getWeekInfo(settings);
    const q=(allQuests[wi.id]||{})[qid];
    const xp=questXP(q?.difficulty,getBonusEvent(wi.id));
    await api.patch(`parties/${partyCode}/quests/${wi.id}/${qid}`,{completed:true,completedAt:Date.now(),proofStatus:'approved',xpAwarded:xp});
    addToast('芒聹聯 PROOF APPROVED',`Quest complete! +${xp} XP awarded`,'var(--green)');
  };

  const rejectProof=async(qid,reason)=>{
    const wi=getWeekInfo(settings);
    await api.patch(`parties/${partyCode}/quests/${wi.id}/${qid}`,{proofStatus:'rejected',proofRejectedReason:reason||'Not good enough!'});
    addToast('芒聹聴 PROOF REJECTED','The assigner wants better evidence 冒聼聵陇','var(--red)');
  };

  const pickPenalty=async(qid,choice)=>{
    const wi=getWeekInfo(settings);
    await api.patch(`parties/${partyCode}/quests/${wi.id}/${qid}`,{penaltyChosen:choice});
    addToast('芒聵聽 PENALTY CHOSEN','May your punishment be swift 冒聼聵聢','var(--red)');
  };

  const handleAwardBadges=async(ids,badgeMap)=>{
    const now=Date.now();const updates={};
    ids.forEach(b=>{if(!partyData?.members?.[userId]?.badges?.[b])updates[b]=now;});
    if(Object.keys(updates).length>0){
      await api.patch(`parties/${partyCode}/members/${userId}/badges`,updates);
      ids.slice(0,2).forEach(b=>{
        const def=BADGE_DEFS[b]||SECRET_DEFS[b.replace('SECRET_','')]||{name:b,icon:'冒聼聫聟'};
        addToast(`冒聼聫聟 BADGE UNLOCKED!`,`${def.icon} ${def.name}`,'var(--yellow)',5000);
      });
    }
  };

  const handleSpin=async(result)=>{
    if(result.type==='xp'&&result.val){
      addToast('冒聼聨掳 SPIN REWARD!',`${result.label}`,'var(--yellow)');
    }else if(result.type==='box'){
      await api.patch(`parties/${partyCode}/members/${userId}`,{mysteryBoxes:(partyData?.members?.[userId]?.mysteryBoxes||0)+1});
      addToast('冒聼聯娄 MYSTERY BOX!','Check your Profile tab!','var(--purple)');
    }else if(result.type==='dud'){
      addToast('冒聼聦職 NOTHING TODAY','The wheel has spoken. Touch grass.','var(--dim)');
    }
  };

  const sendChat=async(text)=>{
    const id=mkid();
    const memberName=partyData?.members?.[userId]?.name||userName;
    await api.set(`parties/${partyCode}/chat/${id}`,{uid:userId,name:memberName,text,ts:Date.now()});
    // CHAT_STAR badge check
    const myMsgCount=chatMessages.filter(m=>m.uid===userId).length+1;
    if(myMsgCount>=20)handleAwardBadges(['CHAT_STAR'],{CHAT_STAR:true});
  };

  const handleTabChange=(t)=>{
    if(t==='chat'){
      chatLastSeenRef.current=Date.now();
      localStorage.setItem(K.CHAT_TS,String(Date.now()));
      setChatUnread(0);
    }
    setTab(t);
  };

  if(loading)return<Loading/>;

  const wi=getWeekInfo(settings);
  const members=partyData?.members||{};
  const currentQuests=allQuests[wi.id]||{};
  const myStats=computeStats(allQuests,userId);
  const myStreak=computeStreak(allQuests,userId);
  const savedBadges=members[userId]?.badges||{};
  const maxPer=settings.maxPerPerson||DEF.maxPerPerson;
  const bonusEvent=getBonusEvent(wi.id);
  const liveLeft=Math.max(0,wi.end-Date.now());
  const pendingProofs=Object.values(currentQuests).filter(q=>q.proofStatus==='pending');
  const pendingPenalties=Object.values(currentQuests).filter(q=>q.penaltyApplied&&!q.penaltyChosen);
  const pendingProofCount=pendingProofs.filter(q=>q.assignedBy===userId).length;
  const pendingPenaltyCount=pendingPenalties.filter(q=>q.assignedTo===userId).length;
  const member=members[userId]||{};
  const titleDef=TITLES.find(t=>t.id===member.selectedTitle)||TITLES[0];

  const chatEnabled=settings.chatEnabled!==false;
  const TABS=[
    ['quests','冒聼聯聥 QUESTS',0],['assign','芒聹聫茂赂聫 ASSIGN',pendingProofCount],['log','冒聼聯聹 LOG',0],
    ['board','冒聼聫聠 BOARD',0],['badges','冒聼聫聟 BADGES',0],['pet','冒聼聬戮 PET',0],['shop','冒聼聫陋 SHOP',0],
    ['profile','冒聼聭陇 PROFILE',0],
    ['spin','冒聼聨掳 SPIN',0],
    ...(chatEnabled?[['chat','冒聼聮卢 CHAT',chatUnread]]:[]),
    ['rules','冒聼聯聳 RULES',0],['settings','芒職聶茂赂聫 SETTINGS',0],
  ];

  return(
    <div className="wrap">
      <Toasts toasts={toasts}/>
      {showFeedback&&<FeedbackModal api={api} userName={member.name||userName} partyCode={partyCode} onClose={()=>setShowFeedback(false)}/>}

      {showSwitcher&&(
        <div className="modal-bg" onClick={()=>setShowSwitcher(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">芒聡聞 SWITCH GROUP</div>
            <div className="cdim xs mb12">Current group: <span className="code" style={{cursor:'default'}}>{partyCode}</span></div>
            {savedGroups.filter(g=>g.code!==partyCode).length===0?(
              <div className="notif mb12">No other saved groups. Use the Groups screen to join or create one.</div>
            ):(
              savedGroups.filter(g=>g.code!==partyCode).map(g=>(
                <div key={g.code} className="flexb mb6" style={{padding:'10px 12px',background:'var(--card2)',borderRadius:3,border:'1px solid var(--border)'}}>
                  <div>
                    <span className="code" style={{cursor:'default',fontSize:'.88em'}}>{g.code}</span>
                    <span className="cdim xs" style={{marginLeft:8}}>{g.name}</span>
                  </div>
                  <button className="btn-ok" style={{fontSize:'.8em',padding:'5px 14px'}} onClick={()=>{setShowSwitcher(false);onSwitchParty(g.code,g.name);}}>芒聠聮 SWITCH</button>
                </div>
              ))
            )}
            <div className="flexi gap6 mt12">
              <button style={{flex:1}} onClick={()=>{setShowSwitcher(false);onLeave();}}>+ JOIN / CREATE NEW</button>
              <button style={{flex:1}} onClick={()=>setShowSwitcher(false)}>[ CANCEL ]</button>
            </div>
          </div>
        </div>
      )}

      {showSummary&&summaryWeek&&(
        <WeeklySummaryModal summary={{weekId:summaryWeek}} members={members} allQuests={allQuests} userId={userId}
          onClose={()=>{setShowSummary(false);setSummaryWeek(null);}}/>
      )}

      {/* Header */}
      <div className="hdr" style={{paddingBottom:10}}>
        <div className="flexb" style={{flexWrap:'wrap',gap:8}}>
          <div>
            <h1 style={{fontSize:'clamp(1.1rem,3.5vw,1.7rem)'}}>[ FRIEND QUEST ]</h1>
            <div className="sub">PARTY: <span className="code" onClick={()=>{navigator.clipboard.writeText(partyCode);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>{partyCode}</span>
              {copied&&<span className="cgreen xs"> 芒聹聯</span>}
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div className="cp small">{member.name||userName}</div>
            <div style={{color:titleDef.color,fontSize:'.75em'}}>[ {titleDef.name} ]</div>
            <div className="cyellow small">芒職隆 {myStats.xp} XP {myStreak.current>=2&&`冒聼聰楼 ${myStreak.current}wk`}</div>
            <div style={{marginTop:2}}><span className="coin-badge">冒聼陋聶 {member.coins||0}</span></div>
            <button style={{fontSize:'.7em',padding:'2px 7px',marginTop:3}} onClick={()=>setShowFeedback(true)}>冒聼聮聦 FEEDBACK</button>
          </div>
        </div>
      </div>

      {/* Bonus event banner */}
      {bonusEvent?.id!=='normal'&&bonusEvent?.name&&(
        <div className="event-banner"><span className="cpurple bold">{bonusEvent.name}</span>  <span className="cdim xs">{bonusEvent.desc}</span></div>
      )}

      {/* Timer */}
      {wi.inWindow?(
        <div className={`timer-box ${wi.hoursLeft<12?'urgent':''}`}>
          <div className="cdim xs" style={{marginBottom:2}}>TIME REMAINING</div>
          <div className="t-num">{timerStr(liveLeft)}</div>
          {wi.urgentMsg&&<div className="small mt6" style={{color:wi.urgentMsg.col}}>{wi.urgentMsg.msg}</div>}
        </div>
      ):(
        <div className="timer-box closed">WINDOW CLOSED 芒聙聰 Next window: <span className="cyellow">{DAYS[settings.windowDay]} at {hourLabel(settings.windowHour)}</span></div>
      )}

      {/* Tabs */}
      <div className="tabs">
        {TABS.map(([id,label,notif])=>(
          <button key={id} className={tab===id?'active':''} onClick={()=>handleTabChange(id)}>
            {label}{notif>0&&<span className="notif-dot"/>}
          </button>
        ))}
        {pendingPenaltyCount>0&&<div className="notif err xs flexi gap6" style={{padding:'4px 8px',margin:'2px'}}>芒聵聽 {pendingPenaltyCount} penalty to pick!</div>}
        <button className="btn-danger" style={{marginLeft:'auto'}} onClick={()=>setShowSwitcher(true)}>芒聡聞 GROUPS</button>
      </div>

      {tab==='quests'&&<MyQuestsTab quests={currentQuests} members={members} userId={userId} inWindow={wi.inWindow}
        onComplete={completeQuest} completing={completing} bonusEvent={bonusEvent}
        onProofSubmit={submitProof} onPickPenalty={pickPenalty}/>}
      {tab==='assign'&&<AssignTab api={api} partyCode={partyCode} userId={userId} members={members}
        quests={currentQuests} weekId={wi.id} inWindow={wi.inWindow} maxPer={maxPer}
        pendingProofs={pendingProofs} onApprove={approveProof} onReject={rejectProof}/>}
      {tab==='log'&&<QuestLogTab quests={currentQuests} members={members} userId={userId} weekId={wi.id} api={api} partyCode={partyCode}/>}
      {tab==='board'&&<LeaderboardTab members={members} allQuests={allQuests} userId={userId} currentWeekId={wi.id} bonusEvent={bonusEvent}/>}
      {tab==='badges'&&<BadgesTab allQuests={allQuests} userId={userId} members={members} savedBadges={savedBadges} onAward={handleAwardBadges}/>}
      {tab==='profile'&&<ProfileTab allQuests={allQuests} userId={userId} members={members} api={api} partyCode={partyCode} onTitleChange={t=>setPartyData(p=>({...p,members:{...p.members,[userId]:{...p.members[userId],selectedTitle:t}}}))}/>}
      {tab==='pet'&&<PetTab allQuests={allQuests} userId={userId} badges={savedBadges} stats={myStats}/>}
      {tab==='shop'&&<ShopTab api={api} partyCode={partyCode} userId={userId} members={members} addToast={addToast} partyData={partyData}/>}
      {tab==='spin'&&<DailySpinTab api={api} partyCode={partyCode} userId={userId} members={members} allQuests={allQuests} onSpin={handleSpin}/>}
      {tab==='chat'&&<ChatTab api={api} partyCode={partyCode} userId={userId} members={members} chatMessages={chatMessages} onSend={sendChat} enabled={chatEnabled}/>}
      {tab==='rules'&&<RulesTab/>}
      {tab==='settings'&&<SettingsTab api={api} partyCode={partyCode} settings={settings} onSaved={s=>setSettings({...DEF,...s})}/>}
    </div>
  );
}

// 芒聲聬芒聲聬芒聲聬 APP 芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬芒聲聬
function App(){
  const [screen,setScreen]=useState('init');
  const [api]=useState(()=>makeApi(DB));
  const [userId]=useState(()=>{let id=localStorage.getItem(K.UID);if(!id){id=mkid();localStorage.setItem(K.UID,id);}return id;});
  const [partyCode,setPartyCode]=useState('');
  const [userName,setUserName]=useState('');
  useEffect(()=>{
    localStorage.setItem(K.URL,DB);
    const party=localStorage.getItem(K.PARTY),name=localStorage.getItem(K.NAME);
    if(party&&name){setPartyCode(party);setUserName(name);setScreen('game');}else setScreen('party');
  },[]);
  const switchParty=(code,name)=>{
    localStorage.setItem(K.PARTY,code);
    localStorage.setItem(K.NAME,name);
    setPartyCode(code);
    setUserName(name);
    setScreen('game');
  };
  if(screen==='init')return<Loading/>;
  if(screen==='party')return<Party api={api} userId={userId} onDone={(c,n)=>{localStorage.setItem(K.PARTY,c);localStorage.setItem(K.NAME,n);setPartyCode(c);setUserName(n);setScreen('game');}}/>;
  if(screen==='game')return<Game key={partyCode} api={api} userId={userId} partyCode={partyCode} userName={userName} onLeave={()=>{localStorage.removeItem(K.PARTY);setPartyCode('');setScreen('party');}} onSwitchParty={switchParty}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
